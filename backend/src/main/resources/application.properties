spring.application.name=propath-api

# File-based H2 — data persists between restarts (Milestone 3 persistence requirement)
spring.datasource.url=jdbc:h2:file:./data/propath
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080

# JWT — override JWT_SECRET in env for anything beyond local dev
security.jwt.secret=${JWT_SECRET:change-me-in-env-a-very-long-dev-only-secret-12345678}
security.jwt.expiration-ms=86400000

# CORS — React dev server
app.cors.allowed-origins=http://localhost:5173
